AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Flux backend infrastructure — ECS Fargate poller, Lambda API with Function URL,
  DynamoDB tables, VPC networking, and SSM configuration.

Parameters:
  ContainerImageUri:
    Type: String
    Description: Full GHCR image URI for the poller container (e.g., ghcr.io/owner/flux-poller:latest)

  AlphaESSAppId:
    Type: String
    Description: AlphaESS developer App ID

  SystemSerialNumber:
    Type: String
    Description: AlphaESS system serial number

  OffPeakWindowStart:
    Type: String
    Default: "11:00"
    Description: Off-peak window start time (HH:MM)

  OffPeakWindowEnd:
    Type: String
    Default: "14:00"
    Description: Off-peak window end time (HH:MM)

  SSMPathPrefix:
    Type: String
    Default: /flux
    Description: SSM Parameter Store path prefix for configuration parameters

Resources:
  # --- VPC and Networking ---

  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/24
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: flux-vpc

  SubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.0.0/25
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: flux-subnet-a

  SubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.0.128/25
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: flux-subnet-b

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: flux-igw

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: flux-rt

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SubnetA
      RouteTableId: !Ref RouteTable

  SubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SubnetB
      RouteTableId: !Ref RouteTable

  DynamoDBEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub com.amazonaws.${AWS::Region}.dynamodb
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref RouteTable

  S3Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref RouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Flux Fargate task - all egress, no ingress
      VpcId: !Ref Vpc
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: flux-sg

Outputs:
  FunctionUrl:
    Description: Lambda Function URL for the API
    Value: !GetAtt ApiFunctionUrl.FunctionUrl

  EcsClusterName:
    Description: ECS cluster name
    Value: !Ref EcsCluster

  EcsServiceName:
    Description: ECS service name
    Value: !GetAtt PollerService.Name
